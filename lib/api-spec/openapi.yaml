openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: InsuraBridge - Insurance Middleware Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: users
  - name: claims
  - name: messages
  - name: calls
  - name: documents
  - name: feedback
  - name: bills
  - name: notifications
  - name: ecards
  - name: network
  - name: scrutiny
  - name: portability
  - name: renewals
  - name: members
  - name: settlements

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [health]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  # AUTH
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current logged-in user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # USERS
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # NOTIFICATIONS
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications for current user
      parameters:
        - name: userId
          in: query
          required: false
          schema:
            type: string
        - name: unreadOnly
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"
    post:
      operationId: createNotification
      tags: [notifications]
      summary: Create a notification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNotificationRequest"
      responses:
        "201":
          description: Notification created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notification marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /notifications/read-all:
    patch:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read for a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: integer
              required:
                - userId
      responses:
        "200":
          description: All notifications marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # CLAIMS
  /claims:
    get:
      operationId: listClaims
      tags: [claims]
      summary: List all claims
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: customerId
          in: query
          required: false
          schema:
            type: string
        - name: hospitalId
          in: query
          required: false
          schema:
            type: string
        - name: tpaId
          in: query
          required: false
          schema:
            type: string
        - name: insurerId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of claims
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Claim"
    post:
      operationId: createClaim
      tags: [claims]
      summary: Create a new claim
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClaimRequest"
      responses:
        "201":
          description: Claim created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Claim"

  /claims/{id}:
    get:
      operationId: getClaim
      tags: [claims]
      summary: Get claim by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Claim found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Claim"
    patch:
      operationId: updateClaim
      tags: [claims]
      summary: Update claim
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClaimRequest"
      responses:
        "200":
          description: Claim updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Claim"

  # MESSAGES & THREADS
  /messages:
    get:
      operationId: listMessages
      tags: [messages]
      summary: List messages for a thread
      parameters:
        - name: claimId
          in: query
          required: false
          schema:
            type: string
        - name: threadId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /threads:
    get:
      operationId: listThreads
      tags: [messages]
      summary: List all message threads
      responses:
        "200":
          description: List of threads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Thread"
    post:
      operationId: createThread
      tags: [messages]
      summary: Create a new thread
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateThreadRequest"
      responses:
        "201":
          description: Thread created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Thread"

  # CALLS
  /calls:
    get:
      operationId: listCallLogs
      tags: [calls]
      summary: List all call logs
      parameters:
        - name: claimId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of call logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CallLog"
    post:
      operationId: createCallLog
      tags: [calls]
      summary: Log a call
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCallLogRequest"
      responses:
        "201":
          description: Call log created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallLog"

  # DOCUMENTS
  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List documents
      parameters:
        - name: claimId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: uploadDocument
      tags: [documents]
      summary: Upload a document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadDocumentRequest"
      responses:
        "201":
          description: Document uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  # FEEDBACK (customer feedback)
  /feedback:
    get:
      operationId: listFeedback
      tags: [feedback]
      summary: List all customer feedback
      parameters:
        - name: targetEntity
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of feedback
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Feedback"
    post:
      operationId: submitFeedback
      tags: [feedback]
      summary: Submit customer feedback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitFeedbackRequest"
      responses:
        "201":
          description: Feedback submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Feedback"

  # APP FEEDBACK (feedback about the InsuraBridge app itself)
  /app-feedback:
    get:
      operationId: listAppFeedback
      tags: [feedback]
      summary: List app-level feedback
      responses:
        "200":
          description: List of app feedback
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppFeedback"
    post:
      operationId: submitAppFeedback
      tags: [feedback]
      summary: Submit app feedback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitAppFeedbackRequest"
      responses:
        "201":
          description: App feedback submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppFeedback"

  # BILLS
  /bills:
    get:
      operationId: listBills
      tags: [bills]
      summary: List bills
      parameters:
        - name: claimId
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of bills
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bill"
    post:
      operationId: createBill
      tags: [bills]
      summary: Create a bill
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBillRequest"
      responses:
        "201":
          description: Bill created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bill"

  /bills/{id}:
    patch:
      operationId: updateBill
      tags: [bills]
      summary: Update bill status/details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBillRequest"
      responses:
        "200":
          description: Bill updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bill"

  # E-CARDS (TPA feature)
  /ecards:
    get:
      operationId: listEcards
      tags: [ecards]
      summary: List e-cards
      parameters:
        - name: memberId
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of e-cards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ecard"
    post:
      operationId: createEcard
      tags: [ecards]
      summary: Issue a new e-card
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEcardRequest"
      responses:
        "201":
          description: E-card created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ecard"

  /ecards/{id}:
    patch:
      operationId: updateEcard
      tags: [ecards]
      summary: Update e-card status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEcardRequest"
      responses:
        "200":
          description: E-card updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ecard"

  # NETWORK PROVIDERS (TPA feature)
  /network-providers:
    get:
      operationId: listNetworkProviders
      tags: [network]
      summary: List network hospitals/providers
      parameters:
        - name: city
          in: query
          required: false
          schema:
            type: string
        - name: speciality
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of network providers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NetworkProvider"
    post:
      operationId: createNetworkProvider
      tags: [network]
      summary: Add a network provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNetworkProviderRequest"
      responses:
        "201":
          description: Network provider created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkProvider"

  # SCRUTINY SETTLEMENTS (TPA feature)
  /scrutiny:
    get:
      operationId: listScrutiny
      tags: [scrutiny]
      summary: List scrutiny/settlement cases
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: claimId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of scrutiny cases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScrutinyCase"
    post:
      operationId: createScrutiny
      tags: [scrutiny]
      summary: Create a scrutiny case
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScrutinyRequest"
      responses:
        "201":
          description: Scrutiny case created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScrutinyCase"

  /scrutiny/{id}:
    patch:
      operationId: updateScrutiny
      tags: [scrutiny]
      summary: Update scrutiny case
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateScrutinyRequest"
      responses:
        "200":
          description: Scrutiny case updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScrutinyCase"

  # PORTABILITY
  /portability:
    get:
      operationId: listPortability
      tags: [portability]
      summary: List portability requests
      responses:
        "200":
          description: List of portability requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PortabilityRequest"
    post:
      operationId: createPortability
      tags: [portability]
      summary: Submit a portability request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePortabilityRequest"
      responses:
        "201":
          description: Portability request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortabilityRequest"

  /portability/{id}:
    patch:
      operationId: updatePortability
      tags: [portability]
      summary: Update portability request status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePortabilityRequest"
      responses:
        "200":
          description: Portability request updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortabilityRequest"

  # RENEWALS
  /renewals:
    get:
      operationId: listRenewals
      tags: [renewals]
      summary: List policy renewals
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of renewals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Renewal"
    post:
      operationId: createRenewal
      tags: [renewals]
      summary: Create a renewal request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRenewalRequest"
      responses:
        "201":
          description: Renewal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Renewal"

  /renewals/{id}:
    patch:
      operationId: updateRenewal
      tags: [renewals]
      summary: Update renewal status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRenewalRequest"
      responses:
        "200":
          description: Renewal updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Renewal"

  # MEMBERS
  /members:
    get:
      operationId: listMembers
      tags: [members]
      summary: List policy members
      parameters:
        - name: policyNumber
          in: query
          required: false
          schema:
            type: string
        - name: customerId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"
    post:
      operationId: addMember
      tags: [members]
      summary: Add a new member to a policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMemberRequest"
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"

  # REIMBURSEMENT SETTLEMENTS
  /reimbursement-settlements:
    get:
      operationId: listReimbursementSettlements
      tags: [settlements]
      summary: List reimbursement settlements
      parameters:
        - name: claimId
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of settlements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReimbursementSettlement"
    post:
      operationId: createReimbursementSettlement
      tags: [settlements]
      summary: Create a reimbursement settlement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReimbursementSettlementRequest"
      responses:
        "201":
          description: Settlement created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReimbursementSettlement"

  /reimbursement-settlements/{id}:
    patch:
      operationId: updateReimbursementSettlement
      tags: [settlements]
      summary: Update settlement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReimbursementSettlementRequest"
      responses:
        "200":
          description: Settlement updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReimbursementSettlement"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    DashboardStats:
      type: object
      properties:
        totalClaims:
          type: integer
        pendingClaims:
          type: integer
        approvedClaims:
          type: integer
        rejectedClaims:
          type: integer
        totalBillAmount:
          type: number
        approvedBillAmount:
          type: number
        openThreads:
          type: integer
        totalFeedback:
          type: integer
        averageRating:
          type: number
        unreadNotifications:
          type: integer
        pendingSettlements:
          type: integer
        activeMembers:
          type: integer
      required:
        - totalClaims
        - pendingClaims
        - approvedClaims
        - rejectedClaims
        - totalBillAmount
        - approvedBillAmount
        - openThreads
        - totalFeedback
        - averageRating
        - unreadNotifications
        - pendingSettlements
        - activeMembers

    AuthUser:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [customer, hospital, tpa, insurer, admin]
        organization:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
      required: [id, name, email, role]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [customer, hospital, tpa, insurer, admin]
        organization:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, name, email, role, createdAt]

    CreateUserRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
