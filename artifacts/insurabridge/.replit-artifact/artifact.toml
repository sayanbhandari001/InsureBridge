kind = "web"
previewPath = "/"
title = "InsuraBridge"
version = "1.0.0"
id = "artifacts/insurabridge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26164

[services.development]
run = "pnpm --filter @workspace/insurabridge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/insurabridge", "run", "build" ]
publicDir = "artifacts/insurabridge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26164"
BASE_PATH = "/"
