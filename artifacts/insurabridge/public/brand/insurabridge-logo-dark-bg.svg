<svg width="560" height="200" viewBox="0 0 560 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="560" height="200" rx="16" fill="#060c1a"/>

  <defs>
    <linearGradient id="archG" x1="0%" y1="0%" x2="100%" y2="60%">
      <stop offset="0%" stop-color="#00897B"/>
      <stop offset="100%" stop-color="#00BFA5"/>
    </linearGradient>
    <linearGradient id="personGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon group centered at x=80 -->
  <g transform="translate(80, 95)">
    <!-- Person left -->
    <circle cx="-44" cy="0" r="11" fill="url(#personGrad)"/>
    <path d="M -54 14 Q -56 30 -54 44 L -34 44 Q -32 30 -34 14 Z" fill="url(#personGrad)"/>
    <path d="M -34 22 Q -24 18 -12 16" stroke="url(#personGrad)" stroke-width="5" stroke-linecap="round" fill="none"/>
    <circle cx="-12" cy="16" r="4" fill="#00BFA5"/>

    <!-- Person right -->
    <circle cx="44" cy="0" r="11" fill="url(#personGrad)"/>
    <path d="M 34 14 Q 32 30 34 44 L 54 44 Q 56 30 54 14 Z" fill="url(#personGrad)"/>
    <path d="M 34 22 Q 24 18 12 16" stroke="url(#personGrad)" stroke-width="5" stroke-linecap="round" fill="none"/>
    <circle cx="12" cy="16" r="4" fill="#00BFA5"/>

    <!-- Bridge arch -->
    <path d="M -38 16 Q 0 -38 38 16" stroke="url(#archG)" stroke-width="5.5" stroke-linecap="round" fill="none" filter="url(#glow)"/>

    <!-- Keystone dot -->
    <circle cx="0" cy="-24" r="6" fill="#00BFA5"/>
    <circle cx="0" cy="-24" r="3" fill="white"/>

    <!-- Ground line -->
    <line x1="-52" y1="48" x2="52" y2="48" stroke="#00897B" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- INSURA text -->
  <text x="156" y="96" font-family="'Plus Jakarta Sans','Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="52" fill="#bfdbfe" letter-spacing="-1">INSURA</text>

  <!-- BRIDGE text -->
  <text x="158" y="146" font-family="'Plus Jakarta Sans','Helvetica Neue',Arial,sans-serif" font-weight="300" font-size="44" fill="#2dd4bf" letter-spacing="7">BRIDGE</text>

  <!-- Tagline -->
  <text x="280" y="178" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-weight="600" font-size="9" fill="#94d4f5" letter-spacing="2.5" text-anchor="middle">TPAs · INSURERS · HOSPITALS · INSURANCE COMPANIES</text>
</svg>
