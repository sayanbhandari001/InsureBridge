  <text x="390" y="178" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" fill="#6b7280">#060c1a</text>
  <!-- Light BG -->
  <rect x="30" y="200" width="560" height="1" fill="#374151"/>
  <text x="30" y="228" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" fill="#6b7280">Typography: Plus Jakarta Sans (display, 800/300) · Inter (body)</text>
  <text x="30" y="248" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" fill="#6b7280">Gradient: linear 135° from #1B3A6B → #00897B</text>
