<svg width="600" height="260" viewBox="0 0 600 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="260" rx="16" fill="#111827"/>
  <text x="30" y="38" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="16" fill="white">InsuraBridge — Brand Colors</text>
  <!-- Navy -->
  <rect x="30" y="60" width="100" height="80" rx="10" fill="#1B3A6B"/>
  <text x="30" y="162" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="600" font-size="11" fill="#9ca3af">Navy</text>
  <text x="30" y="178" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" fill="#6b7280">#1B3A6B</text>
  <!-- Teal Dark -->
  <rect x="150" y="60" width="100" height="80" rx="10" fill="#00897B"/>
  <text x="150" y="162" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="600" font-size="11" fill="#9ca3af">Teal</text>
  <text x="150" y="178" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" fill="#6b7280">#00897B</text>
  <!-- Teal Light -->
  <rect x="270" y="60" width="100" height="80" rx="10" fill="#00BFA5"/>
  <text x="270" y="162" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="600" font-size="11" fill="#9ca3af">Teal Light</text>
  <text x="270" y="178" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" fill="#6b7280">#00BFA5</text>
  <!-- Dark BG -->
  <rect x="390" y="60" width="100" height="80" rx="10" fill="#060c1a" stroke="#374151" stroke-width="1"/>
